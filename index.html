<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedex | Global Tracking</title>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root { --fedex-purple: #4D148C; --fedex-orange: #FF6200; --bg: #f2f2f2; }
        body { font-family: 'Roboto', Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Mobile Header */
        .navbar { background: var(--fedex-purple); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 22px; font-weight: 900; color: white; cursor: pointer; letter-spacing: -1px; }
        .orange-text { color: var(--fedex-orange); }

        /* Mobile Card Container */
        .wrapper { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        
        h2 { font-size: 1.4rem; margin-bottom: 20px; color: var(--fedex-purple); }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; font-weight: bold; color: #666; margin-left: 5px; }
        
        input { width: 100%; padding: 15px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; margin-top: 5px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--fedex-purple); }
        
        .btn-track { background: var(--fedex-orange); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Result Section */
        #result { display: none; margin-top: 25px; text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 14px; text-align: center; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #fafafa; padding-bottom: 5px; }
        .info-row span { color: #666; }
        .package-img { width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; }

        /* Invoice Button */
        .btn-invoice { background: #333; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; margin-top: 15px; cursor: pointer; }

        /* Hide Google Translate Bar */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

<div id="google_translate_element" style="display:none"></div>

<div class="navbar">
    <div class="logo" onclick="adminAuth()">Fed<span class="orange-text">ex</span></div>
    <div style="color:white; font-size: 12px;">Express Mobile</div>
</div>

<div class="wrapper">
    <div class="card">
        <h2>Track Your Package</h2>
        <div class="input-group">
            <label>ENTER TRACKING NUMBER</label>
            <input type="text" id="trackCode" placeholder="Ex: 1234 5678 9012">
        </div>
        <button class="btn-track" onclick="track()">Track Shipment</button>

        <div id="result">
            <div id="status-badge" class="status-box"></div>
            <div class="info-row"><span>Recipient:</span> <b id="r-name"></b></div>
            <div class="info-row"><span>From:</span> <b id="r-from"></b></div>
            <div class="info-row"><span>To:</span> <b id="r-to"></b></div>
            <div class="info-row"><span>Updated:</span> <b id="r-date"></b></div>
            
            <div id="img-container"></div>

            <div id="payment-needed" style="display:none; margin-top: 20px; background: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107;">
                <p style="margin:0; font-size: 13px; color: #856404;"><b>Attention:</b> Package held at hub. Clearance fee of <b>$<span id="r-fee"></span></b> is required for final delivery.</p>
                <button class="btn-invoice" onclick="window.print()">Download Official Invoice</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Google Translate
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }

    async function track() {
        const code = document.getElementById('trackCode').value;
        const res = await fetch('data.json?v=' + Date.now());
        const data = await res.json();
        const s = data[code];

        if(s) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('r-name').innerText = s.name;
            document.getElementById('r-from').innerText = s.origin;
            document.getElementById('r-to').innerText = s.dest;
            document.getElementById('r-date').innerText = s.updated;
            
            const badge = document.getElementById('status-badge');
            badge.innerText = s.status;
            badge.style.background = s.status.includes("Arrived") ? "#d4edda" : "#e2e3e5";
            badge.style.color = s.status.includes("Arrived") ? "#155724" : "#383d41";

            if(s.image) {
                document.getElementById('img-container').innerHTML = `<img src="${s.image}" class="package-img">`;
            }

            if(s.status.includes("Arrived")) {
                document.getElementById('payment-needed').style.display = 'block';
                document.getElementById('r-fee').innerText = s.fee;
            }
        } else {
            alert("Invalid Tracking Code");
        }
    }

    function adminAuth() {
        if(prompt("Pass:") === "0000") {
            const t = prompt("Token:");
            window.location.href = "admin.html?token=" + t;
        }
    }
</script>
</body>
</html>
